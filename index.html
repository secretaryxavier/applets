<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xavier Brown | Constellation Artefact</title>
  <style>
    :root {
      --gold: #e4c17e;
      --parchment: #f4e7d1;
      --mist: #d2dfdb;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--parchment);
      font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(116, 208, 194, 0.16), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(228, 193, 126, 0.15), transparent 24%),
        radial-gradient(circle at left bottom, rgba(74, 23, 28, 0.45), transparent 34%),
        linear-gradient(160deg, #040609 0%, #0a1018 42%, #180f13 100%);
    }

    body::before, body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(rgba(116, 208, 194, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(116, 208, 194, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85), transparent);
    }

    body::after {
      background:
        radial-gradient(circle at center, rgba(228, 193, 126, 0.08), transparent 30%),
        repeating-linear-gradient(135deg, transparent 0 18px, rgba(228, 193, 126, 0.03) 18px 19px);
      mix-blend-mode: screen;
      opacity: 0.7;
    }

    img { display: block; width: 100%; height: 100%; object-fit: cover; }
    button { border: 0; font: inherit; color: inherit; }

    /* ── stage & panel ───────────────────────────────── */

    .stage {
      position: relative;
      z-index: 1;
      height: 100dvh;
      padding: clamp(0.35rem, 1vw, 1rem);
    }

    .constellation {
      position: relative;
      height: 100%;
      max-width: 1400px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: clamp(24px, 4vw, 38px);
      border: 1px solid rgba(228, 193, 126, 0.18);
      background:
        radial-gradient(circle at center, rgba(116, 208, 194, 0.08), transparent 20%),
        radial-gradient(circle at center, rgba(228, 193, 126, 0.05), transparent 36%),
        linear-gradient(180deg, rgba(12, 18, 27, 0.94), rgba(7, 11, 17, 0.96));
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .constellation::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      border: 1px solid rgba(116, 208, 194, 0.08);
      pointer-events: none;
    }

    /* ── top header ──────────────────────────────────── */

    .top-header {
      position: absolute;
      top: clamp(0.8rem, 2vw, 1.2rem);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      z-index: 6;
      white-space: nowrap;
    }

    .hud {
      margin: 0;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.66rem;
      color: var(--gold);
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(228, 193, 126, 0.14);
      background: rgba(8, 12, 18, 0.6);
      backdrop-filter: blur(10px);
    }

    .core-copy {
      text-align: center;
      padding: 0.45rem 0.8rem 0.5rem;
      border-radius: 14px;
      border: 1px solid rgba(228, 193, 126, 0.12);
      background: rgba(8, 12, 18, 0.52);
      backdrop-filter: blur(10px);
    }

    .core-name {
      margin: 0;
      font-family: Georgia, "Palatino Linotype", "Book Antiqua", serif;
      font-size: clamp(0.95rem, 1.6vw, 1.3rem);
      letter-spacing: 0.04em;
      color: #fff3d9;
      text-shadow: 0 0 16px rgba(228, 193, 126, 0.18);
    }

    .meta-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.25rem;
      margin-top: 0.3rem;
    }

    .meta-strip span {
      padding: 0.22rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(228, 193, 126, 0.16);
      background: linear-gradient(180deg, rgba(20, 28, 38, 0.88), rgba(10, 14, 21, 0.92));
      font-size: 0.66rem;
      color: var(--parchment);
    }

    /* ── central orb ─────────────────────────────────── */

    .core {
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      z-index: 4;
    }

    .core-orb {
      position: relative;
      width: min(36vw, 400px);
      aspect-ratio: 1;
      padding: 0.65rem;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(228, 193, 126, 0.18);
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.34), transparent 24%),
        radial-gradient(circle at 66% 76%, rgba(74, 23, 28, 0.22), transparent 34%),
        linear-gradient(145deg, rgba(228,193,126,0.58), rgba(116,208,194,0.28) 42%, rgba(12,18,27,0.96) 74%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1),
        0 24px 40px rgba(0,0,0,0.46),
        inset 0 1px 18px rgba(255,255,255,0.18);
    }

    .core-orb img { border-radius: 50%; }

    /* ── bottom node strip ───────────────────────────── */

    .node-strip {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      width: min(94vw, 1100px);
      z-index: 5;
    }

    .signal-node {
      min-width: clamp(88px, 8vw, 124px);
      padding: 0.58rem 0.6rem 0.56rem;
      border-radius: 999px;
      border: 1px solid rgba(228, 193, 126, 0.16);
      background: linear-gradient(180deg, rgba(24, 33, 43, 0.96), rgba(9, 13, 19, 0.96));
      text-align: center;
      cursor: pointer;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.08);
      transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
    }

    .signal-node strong {
      display: block;
      font-size: 0.82rem;
      color: #fff4dd;
    }

    .signal-node span {
      display: block;
      margin-top: 0.1rem;
      font-size: 0.58rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(244, 231, 209, 0.7);
    }

    .signal-node:hover,
    .signal-node:focus-visible {
      outline: none;
      transform: scale(1.05);
      border-color: rgba(228, 193, 126, 0.6);
      background: linear-gradient(180deg, rgba(36, 49, 61, 0.98), rgba(10, 15, 23, 0.96));
      box-shadow:
        0 14px 28px rgba(0,0,0,0.38),
        0 0 0 1px rgba(116, 208, 194, 0.2),
        0 0 22px rgba(228, 193, 126, 0.12);
    }

    /* ── photo strips ────────────────────────────────── */

    .photos-left,
    .photos-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      z-index: 3;
      width: clamp(160px, 19vw, 260px);
    }

    .photos-left  { right: calc(50% + min(18vw, 200px) + 1.2rem); }
    .photos-right { left:  calc(50% + min(18vw, 200px) + 1.2rem); }

    /* ── individual photos ───────────────────────────── */

    .photo-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(228, 193, 126, 0.18);
      background:
        linear-gradient(135deg, rgba(116, 208, 194, 0.1), rgba(14, 20, 29, 0.96)),
        rgba(5, 8, 13, 0.94);
      box-shadow: 0 16px 32px rgba(0,0,0,0.35);
    }

    .photo.book      .photo-frame { aspect-ratio: 5 / 4; }
    .photo.landscape .photo-frame { aspect-ratio: 16 / 9; }

    .photo-label {
      padding: 0.38rem 0.46rem;
      border-radius: 12px;
      background: rgba(8, 12, 18, 0.78);
      border: 1px solid rgba(228, 193, 126, 0.1);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .photo-label strong {
      display: -webkit-box;
      font-size: 0.68rem;
      line-height: 1.2;
      color: #fff4dd;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .photo-label span {
      display: block;
      margin-top: 0.1rem;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(244, 231, 209, 0.65);
    }

    /* ── missing overlay ─────────────────────────────── */

    .media-frame.missing img { opacity: 0; }

    .missing-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 0.6rem;
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(228, 193, 126, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(14, 21, 30, 0.84), rgba(7, 11, 17, 0.92));
      border: 1px dashed rgba(228, 193, 126, 0.26);
      color: var(--mist);
    }

    .media-frame:not(.missing) .missing-overlay { opacity: 0; pointer-events: none; }
    .core-orb .missing-overlay { border-radius: 50%; }

    .slot-kicker {
      margin: 0;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 0.58rem;
      color: var(--gold);
    }

    .missing-overlay strong, .missing-overlay small { display: block; }

    .missing-overlay strong {
      margin: 0.25rem 0 0.15rem;
      color: #fff3db;
      font-size: 0.76rem;
    }

    .missing-overlay small {
      font-size: 0.6rem;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── photo-columns: transparent wrapper on desktop ── */

    .photo-columns { display: contents; }

    /* ── desktop responsive ──────────────────────────── */

    @media (max-width: 1100px) {
      .core-orb { width: min(38vw, 340px); }
      .photos-left, .photos-right { width: clamp(130px, 16vw, 210px); }
    }

    @media (max-width: 800px) {
      .core-orb { width: min(44vw, 240px); }
      .photos-left, .photos-right { width: clamp(100px, 18vw, 160px); gap: 0.5rem; }
      .signal-node { min-width: clamp(76px, 13vw, 108px); }
      .signal-node strong { font-size: 0.72rem; }
      .signal-node span { font-size: 0.5rem; }
    }

    /* ── mobile layout (≤ 720px) ─────────────────────── */

    @media (max-width: 720px) {
      html, body { height: auto; overflow-y: auto; }

      .stage { height: auto; min-height: 100dvh; padding: 0.5rem; }

      .constellation {
        height: auto;
        overflow: visible;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.2rem 0.9rem 1.4rem;
        gap: 1.2rem;
      }

      /* header: static, wrappable */
      .top-header {
        position: static;
        transform: none;
        white-space: normal;
        width: 100%;
        align-items: center;
      }

      .hud { white-space: normal; text-align: center; }

      /* orb: static, centred */
      .core {
        position: static;
        transform: none;
        display: flex;
        justify-content: center;
      }

      .core-orb { width: min(68vw, 280px); }

      /* photos: two columns side by side */
      .photo-columns {
        display: flex;
        gap: 0.7rem;
        width: 100%;
      }

      .photos-left,
      .photos-right {
        position: static;
        transform: none;
        width: 50%;
        flex-shrink: 1;
        min-width: 0;
        gap: 0.7rem;
      }

      /* nodes: static, centred wrap */
      .node-strip {
        position: static;
        transform: none;
        width: 100%;
        gap: 0.4rem;
      }

      .signal-node {
        min-width: clamp(80px, 28vw, 140px);
        padding: 0.56rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="constellation">

      <!-- top header -->
      <div class="top-header">
        <p class="hud">HON 407 AI Artefact / constellation</p>
        <div class="core-copy">
          <p class="core-name">Xavier Brown</p>
          <div class="meta-strip">
            <span>He/They</span>
            <span>Portland, Oregon</span>
            <span>Psychology</span>
          </div>
        </div>
      </div>

      <!-- central orb -->
      <div class="core">
        <figure class="core-orb media-frame missing">
          <img src="images/xavier-psu-ina-presentation.jpeg" alt="Xavier Brown presenting at the Interdisciplinary Neuroscience Association at PSU.">
          <div class="missing-overlay">
            <div>
              <p class="slot-kicker">Central orb</p>
              <strong>PSU presentation photo</strong>
              <small>images/xavier-psu-ina-presentation.jpeg</small>
            </div>
          </div>
        </figure>
      </div>

      <!-- photo columns wrapper (flex row on mobile, transparent on desktop) -->
      <div class="photo-columns">

      <!-- left photo strip -->
      <div class="photos-left">
        <figure class="photo">
          <div class="photo-frame media-frame missing">
            <img src="images/xavier-sfn-northwest-noggin-san-diego.png" alt="Xavier Brown with Northwest Noggin at SfN in San Diego.">
            <div class="missing-overlay">
              <div>
                <p class="slot-kicker">Photo</p>
                <strong>Northwest Noggin</strong>
                <small>xavier-sfn-northwest-noggin-san-diego.png</small>
              </div>
            </div>
          </div>
          <div class="photo-label"><strong>Northwest Noggin</strong><span>SfN / San Diego</span></div>
        </figure>

        <figure class="photo">
          <div class="photo-frame media-frame missing">
            <img src="images/xavier-painting.png" alt="One of Xavier Brown's paintings.">
            <div class="missing-overlay">
              <div>
                <p class="slot-kicker">Photo</p>
                <strong>Painting</strong>
                <small>xavier-painting.png</small>
              </div>
            </div>
          </div>
          <div class="photo-label"><strong>Dialectical Behaviorism In The Latent Space</strong><span>2023</span></div>
        </figure>

      </div>

      <!-- right photo strip -->
      <div class="photos-right">
        <figure class="photo">
          <div class="photo-frame media-frame missing">
            <img src="images/giordano-bruno.jpg" alt="Portrait representing Giordano Bruno.">
            <div class="missing-overlay">
              <div>
                <p class="slot-kicker">Photo</p>
                <strong>Giordano Bruno</strong>
                <small>giordano-bruno.jpg</small>
              </div>
            </div>
          </div>
          <div class="photo-label"><strong>The monument to Bruno, Campo de' Fiori, Rome</strong><span>Wikipedia</span></div>
        </figure>

        <figure class="photo landscape">
          <div class="photo-frame media-frame missing">
            <img src="images/uo-human-biomechanics-lab.jpeg" alt="University of Oregon Human Biomechanics Lab.">
            <div class="missing-overlay">
              <div>
                <p class="slot-kicker">Photo</p>
                <strong>UO Biomechanics Lab</strong>
                <small>uo-human-biomechanics-lab.jpeg</small>
              </div>
            </div>
          </div>
          <div class="photo-label"><strong>UO Human Biomechanics Lab</strong><span>Research environment</span></div>
        </figure>
      </div>

      </div><!-- end .photo-columns -->

      <!-- bottom node strip -->
      <div class="node-strip">
        <button class="signal-node" type="button">
          <strong>tPBM</strong><span>Neuroscience</span>
        </button>
        <button class="signal-node" type="button">
          <strong>Ufology</strong><span>Hidden Signals</span>
        </button>
        <button class="signal-node" type="button">
          <strong>Painting</strong><span>PNCA / Arts</span>
        </button>
        <button class="signal-node" type="button">
          <strong>Alchemy</strong><span>Method + Symbol</span>
        </button>
        <button class="signal-node" type="button">
          <strong>Biofeedback</strong><span>Embodied Data</span>
        </button>
        <button class="signal-node" type="button">
          <strong>Outreach</strong><span>Science Communication</span>
        </button>
        <button class="signal-node" type="button">
          <strong>Cities</strong><span>For Humans</span>
        </button>
      </div>

    </section>
  </main>

  <script>
    (function () {
      document.querySelectorAll(".media-frame").forEach(function (frame) {
        const img = frame.querySelector("img");
        if (!img) return;
        function sync() {
          frame.classList.toggle("missing", !(img.complete && img.naturalWidth > 0));
        }
        sync();
        img.addEventListener("load", sync);
        img.addEventListener("error", sync);
      });
    }());
  </script>
</body>
</html>
